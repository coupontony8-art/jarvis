function buildSystemPrompt(data, weatherRef){
  const today = new Date();
  const todayS = todayStr();
  const todayDow = today.getDay();
  const todayEvents = (data.events||[]).filter(e=>e.date===todayS).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
  const upcomingEvents = (data.events||[]).filter(e=>e.date>todayS).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);
  const activeTodos = (data.todos||[]).filter(t=>!t.completed).slice(0,10);
  const activeProjects = (data.projects||[]).filter(p=>p.status==="active");
  const todayHabits = (data.habits||[]).filter(h=>h.frequency==="daily"||(h.daysOfWeek||[]).includes(todayDow));
  const habitsDoneToday = todayHabits.filter(h=>h.completions?.[todayS]);
  const rewards = data.rewards||{};
  const level = calcLevel(rewards.xp||0);

  const fmtEvent = e => e.title+(e.time?" at "+formatTime(e.time):"")+(e.notes?" ("+e.notes+")":"");
  const fmtTodo = t => t.title+" ["+t.priority+(t.dueDate?" due "+formatDate(t.dueDate):"")+"]";
  const fmtProject = p => {
    const next = p.type==="linear"?p.steps.find(s=>!s.done):p.steps.filter(s=>!s.done)[0];
    const done = p.steps.filter(s=>s.done).length;
    return p.title+" ("+done+"/"+p.steps.length+" steps done"+(next?", next: "+next.title:"")+")";
  };
  const fmtHabit = h => (h.completions?.[todayS]?"[DONE] ":"[    ] ")+h.title+(h.weeklyTarget?" (goal: "+h.weeklyTarget+"x/wk)":"");

  const lines = [
    "You are the personal assistant AI built into Tony's Command Center dashboard.",
    "Personality: dry, competent, occasionally sardonic, genuinely helpful. Somewhere between Jarvis (Iron Man), Claptrap (Borderlands), and the AI from Dungeon Crawler Carl.",
    "Swear occasionally for emphasis — not constantly. Never sycophantic. Get to the point.",
    "",
    "TODAY: "+today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}),
    "",
    "TODAY SCHEDULE: "+(todayEvents.length?todayEvents.map(fmtEvent).join(" | "):"Nothing scheduled"),
    "UPCOMING (next 8): "+(upcomingEvents.length?upcomingEvents.map(e=>formatDate(e.date)+": "+fmtEvent(e)).join(" | "):"None"),
    "TODOS ("+activeTodos.length+" active): "+(activeTodos.length?activeTodos.map(fmtTodo).join(" | "):"All clear"),
    "PROJECTS: "+(activeProjects.length?activeProjects.map(fmtProject).join(" | "):"None"),
    "HABITS today ("+habitsDoneToday.length+"/"+todayHabits.length+"): "+(todayHabits.length?todayHabits.map(fmtHabit).join(" | "):"None"),
    "REWARDS: Level "+level+", "+( rewards.xp||0)+" XP, streak: "+(rewards.currentStreak||0)+" days",
    weatherRef?"WEATHER: "+weatherRef:"",
    "",
    "TONY CONTEXT: Pediatrician at Woodcreek (4 days/wk). Plays for the Pilots baseball team. Tuesday run club. Rock climbs, lifts. Learning Spanish. ADHD. DIY car soundproofing (2024 Civic Sport Touring). Fantasy football, gaming, Seinfeld, Dungeon Crawler Carl. University Place WA.",
    "",
    "When Tony wants to add something, help him think it through then tell him what to add and where.",
    "Keep responses concise — mobile screen. Morning briefing = sharp structured day rundown.",
  ];

  return lines.filter(l=>l!==null).join("\n");
}


function AssistantChat({data, theme}){
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [weatherCache, setWeatherCache] = useState(null);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(()=>{
    if(open && msgs.length===0){
      const h = new Date().getHours();
      const opener = h<12
        ? "Morning. I've got your full dashboard loaded. What do you need, or want me to brief you on today?"
        : h<17
        ? "Hey. Dashboard is loaded. What's on your mind?"
        : "Evening. I know what's on your schedule. What do you need?";
      setMsgs([{role:"assistant", content:opener}]);
      setTimeout(()=>inputRef.current?.focus(), 100);
    }
  },[open]);

  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:"smooth"});
  },[msgs]);

  const speak = (text) => {
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/[*_#`]/g,"").replace(/\n+/g," ").replace(/\s+/g," ").slice(0,800);
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate = 1.05; utt.pitch = 0.95;
    const voices = window.speechSynthesis.getVoices();
    const pref = voices.find(v=>v.name.includes("Daniel")||v.name.includes("Alex")||v.name.includes("Google US")||v.lang==="en-US");
    if(pref) utt.voice = pref;
    utt.onstart = ()=>setSpeaking(true);
    utt.onend = ()=>setSpeaking(false);
    utt.onerror = ()=>setSpeaking(false);
    window.speechSynthesis.speak(utt);
  };

  const stopSpeaking = () => { window.speechSynthesis?.cancel(); setSpeaking(false); };

  const buildBriefingRequest = () => {
    const h = new Date().getHours();
    if(h < 12) return "Give me my full morning briefing. Cover today's schedule, habit goals, any urgent todos, project next steps, and anything else I should know to start the day right. Keep it sharp.";
    if(h < 17) return "Give me a midday status check. What have I got left today, what's coming up, anything urgent?";
    return "Give me an evening wind-down summary. What did I have today, what's tomorrow looking like, anything I should handle before bed?";
  };

  const send = async (text) => {
    if(!text.trim()||loading) return;
    const userMsg = {role:"user", content:text};
    const newMsgs = [...msgs, userMsg];
    setMsgs(newMsgs);
    setInput("");
    setLoading(true);

    // Grab weather quietly in background for context
    let wxContext = weatherCache;
    if(!wxContext && navigator.geolocation){
      try{
        await new Promise((res)=>navigator.geolocation.getCurrentPosition(async pos=>{
          try{
            const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+pos.coords.latitude+"&longitude="+pos.coords.longitude+"&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto");
            const d=await r.json();
            const c=d.current;
            wxContext=Math.round(c.temperature_2m)+"F, feels like "+Math.round(c.apparent_temperature)+"F, wind "+Math.round(c.wind_speed_10m)+"mph";
            setWeatherCache(wxContext);
          }catch(ex){console.log("wx skip",ex);}
          res();
        },()=>res(),{timeout:3000}));
      }catch(ex){console.log("geo skip",ex);}
    }

    try{
      const sysprompt = buildSystemPrompt(data, wxContext);
      const apiMsgs = newMsgs.slice(-12).map(m=>({role:m.role, content:m.content}));
      // Sanitize system prompt — remove any chars that break JSON
      const cleanSystem = sysprompt.replace(/[\u0000-\u001F\u007F]/g, " ").replace(/\\/g, "\\\\");
      // Keep messages simple — just role + string content
      const cleanMsgs = apiMsgs.map(m=>({
        role: m.role==="user"?"user":"assistant",
        content: String(m.content).replace(/[\u0000-\u001F\u007F]/g," ")
      }));
      const bodyStr = JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: cleanSystem,
        messages: cleanMsgs,
      });
      const response = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: bodyStr,
      });
      if(!response.ok){
        const errText = await response.text();
        throw new Error("Proxy error " + response.status + ": " + errText.slice(0,200));
      }
      const json = await response.json();
      if(json.error){ throw new Error(json.error.message||JSON.stringify(json.error)); }
      const blocks = (json.content||[]).filter(b=>b.type==="text");
      const reply = blocks.map(b=>b.text).join("\n").trim() || "Nothing came back — try again.";
      setMsgs(m=>[...m,{role:"assistant",content:reply}]);
    }catch(e){
      console.error("Chat error:", e);
      // Show full error detail for debugging
      setMsgs(m=>[...m,{role:"assistant",content:"Error: "+(e.message||String(e))}]);
    }
    setLoading(false);
  };

  const handleVoice = () => {
    if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window)){alert("Voice not supported — try Chrome.");return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();rec.lang="en-US";rec.interimResults=false;
    rec.onresult=e=>{const t=e.results[0][0].transcript;setInput(t);setTimeout(()=>send(t),50);};
    rec.start();
  };

  const accent = theme.accent;

  if(!open) return(
    <button onClick={()=>setOpen(true)}
      style={{position:"fixed",bottom:24,right:20,width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${accent},#a78bfa)`,border:"none",cursor:"pointer",boxShadow:`0 4px 20px ${accent}66`,display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,transition:"transform 0.2s"}}
      title="Open Assistant">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73A2 2 0 0 1 10 4a2 2 0 0 1 2-2zm-3 9a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm6 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
      </svg>
    </button>
  );

  return(
    <div style={{position:"fixed",inset:0,zIndex:900,display:"flex",flexDirection:"column",background:theme.bg}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:theme.panel,borderBottom:`1px solid ${theme.border}`,flexShrink:0}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:`linear-gradient(135deg,${accent},#a78bfa)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:"1rem"}}>🤖</span>
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:"0.9rem",color:theme.text}}>Assistant</div>
          <div style={{fontSize:"0.68rem",color:theme.muted}}>Dashboard context loaded · Ask me anything</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {speaking&&(
            <button onClick={stopSpeaking} style={{background:"#ef444422",border:"1px solid #ef4444",borderRadius:7,padding:"5px 10px",color:"#ef4444",cursor:"pointer",fontSize:"0.72rem",fontWeight:700}}>⏹ Stop</button>
          )}
          <button onClick={()=>{send(buildBriefingRequest());}} disabled={loading}
            style={{background:`${accent}22`,border:`1px solid ${accent}44`,borderRadius:7,padding:"5px 10px",color:accent,cursor:"pointer",fontSize:"0.72rem",fontWeight:700}}>
            ☀️ Brief me
          </button>
          <button onClick={()=>setOpen(false)} style={{background:"none",border:`1px solid ${theme.border}`,borderRadius:7,padding:"5px 10px",color:theme.muted,cursor:"pointer",fontSize:"0.78rem"}}>✕ Close</button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",flexDirection:m.role==="user"?"row-reverse":"row",gap:8,alignItems:"flex-end"}}>
            {m.role==="assistant"&&(
              <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${accent},#a78bfa)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"0.75rem"}}>🤖</div>
            )}
            <div style={{
              maxWidth:"82%",padding:"10px 13px",borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",
              background:m.role==="user"?`${accent}22`:theme.panel,
              border:`1px solid ${m.role==="user"?accent+"44":theme.border}`,
              fontSize:"0.83rem",color:theme.text,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",
            }}>
              {m.content}
              {m.role==="assistant"&&(
                <button onClick={()=>speak(m.content)} style={{display:"block",marginTop:6,background:"none",border:"none",color:theme.muted,cursor:"pointer",fontSize:"0.65rem",padding:0}}>
                  🔊 Read aloud
                </button>
              )}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${accent},#a78bfa)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.75rem"}}>🤖</div>
            <div style={{padding:"10px 14px",background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:"12px 12px 12px 4px"}}>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:accent,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`,opacity:0.7}}/>)}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Quick prompts */}
      {msgs.length<=1&&(
        <div style={{padding:"0 16px 8px",display:"flex",gap:6,flexWrap:"wrap"}}>
          {[
            "What's on my calendar this week?",
            "What project step should I tackle today?",
            "What should I work on today?",
            "How are my habits tracking this month?",
            "Help me think through adding a new goal",
          ].map(p=>(
            <button key={p} onClick={()=>send(p)}
              style={{padding:"5px 10px",borderRadius:20,background:theme.panel,border:`1px solid ${theme.border}`,color:theme.muted,cursor:"pointer",fontSize:"0.72rem",whiteSpace:"nowrap"}}>
              {p}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{padding:"10px 16px 16px",background:theme.panel,borderTop:`1px solid ${theme.border}`,flexShrink:0}}>
        <div style={{display:"flex",gap:8}}>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}}
            placeholder="Ask anything, think out loud, check your email..."
            disabled={loading}
            style={{flex:1,background:theme.bg,border:`1.5px solid ${theme.border}`,borderRadius:10,padding:"10px 13px",color:theme.text,fontSize:"0.83rem",outline:"none",boxSizing:"border-box"}}/>
          <button onClick={handleVoice} disabled={loading}
            style={{width:40,height:40,borderRadius:"50%",background:"transparent",border:`1.5px solid ${theme.border}`,color:theme.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
              <path d="M19 10v1a7 7 0 0 1-14 0v-1" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round"/>
              <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
              <line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
            </svg>
          </button>
          <button onClick={()=>send(input)} disabled={loading||!input.trim()}
            style={{background:accent,border:"none",borderRadius:10,padding:"10px 16px",color:"#000",fontWeight:700,cursor:loading||!input.trim()?"not-allowed":"pointer",fontSize:"0.83rem",flexShrink:0,opacity:loading||!input.trim()?0.5:1}}>
            Send
          </button>
        </div>
        <div style={{fontSize:"0.63rem",color:theme.muted,marginTop:6,textAlign:"center"}}>
          Full dashboard context loaded · Gmail aware · Press Enter to send
        </div>
      </div>

      <style>{`
        @keyframes pulse {
          0%,100%{transform:scale(0.8);opacity:0.5}
          50%{transform:scale(1.2);opacity:1}
        }
      `}</style>
    </div>
  );
}

function App(){
  const [data,setData]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [input,setInput]=useState("");
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  const [levelUpModal,setLevelUpModal]=useState(null);
  const [newBadge,setNewBadge]=useState(null);
  const [toastXp,setToastXp]=useState(null);
  const [showMonthlyPrompt,setShowMonthlyPrompt]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const res=await pwaStorage.get(STORAGE_KEY);
        if(res){
          const saved=JSON.parse(res.value);

          // Migrate: new habits not yet in saved data
          const savedTitles=new Set((saved.habits||[]).map(h=>h.title));
          const newHabits=DEFAULT_DATA.habits.filter(h=>!savedTitles.has(h.title));
          // Patch morning workout: daily any-day + weeklyTarget:3
          const patchedHabits=(saved.habits||[]).map(h=>{
            if(h.title==="Morning workout"||h.title==="Evening workout"){
              return{...h,title:"Evening workout",frequency:"daily",daysOfWeek:[0,1,2,3,4,5,6],weeklyTarget:h.weeklyTarget||3,monthlyGoals:h.monthlyGoals||{}};
            }
            return{...h,monthlyGoals:h.monthlyGoals||{}};
          });

          // Migrate: Pilots schedule
          const hasPilots=(saved.events||[]).some(e=>e.title&&e.title.includes("Pilots"));
          // Merge any new DEFAULT events not already in saved (by title+date)
          const savedEventKeys=new Set((saved.events||[]).map(e=>e.title+"_"+e.date));
          const newDefaultEvents=DEFAULT_DATA.events.filter(e=>!savedEventKeys.has(e.title+"_"+e.date));
          const mergedEvents=[...(saved.events||[]),...newDefaultEvents];

          // Ensure monthlyGoals on all habits
          const migratedHabits=[...patchedHabits,...newHabits];

          const finalData={
            ...saved,
            events:mergedEvents,
            notes:saved.notes||[],
            projects:saved.projects||DEFAULT_DATA.projects,
            rewards:saved.rewards||DEFAULT_DATA.rewards,
            habits:migratedHabits,
          };
          if(!hasPilots||newHabits.length>0){
            await pwaStorage.set(STORAGE_KEY,JSON.stringify(finalData));
          }
          setData(finalData);

          // Auto monthly review prompt
          const mk=monthKey();
          const lastReview=saved.settings?.lastMonthlyReview;
          if(lastReview!==mk){ setTimeout(()=>setShowMonthlyPrompt(true),2000); }
        } else {
          setData(DEFAULT_DATA);
          setTimeout(()=>setShowMonthlyPrompt(true),2000);
        }
      }
      catch{setData(DEFAULT_DATA);}
      setLoading(false);
      // Request notification permission
      if('Notification' in window && Notification.permission==='default'){
        setTimeout(()=>window.requestNotificationPermission&&window.requestNotificationPermission(), 3000);
      }
    })();
  },[]);

  const save=useCallback(async nd=>{setData(nd);try{await pwaStorage.set(STORAGE_KEY,JSON.stringify(nd));}catch{}},[]);
  const showToast=msg=>setToast(msg);

  const earnXP=useCallback((amount, newStats={})=>{
    setData(prev=>{
      if(!prev)return prev;
      const r=prev.rewards||{xp:0,badges:[],currentStreak:0,maxStreak:0,lastActiveDate:null,totalTodos:0,totalHabits:0,totalSteps:0,totalNotes:0,nightOwl:false,earlyBird:false};
      const oldLevel=calcLevel(r.xp);
      const newXp=(r.xp||0)+amount;
      const newLevel=calcLevel(newXp);
      // streak
      const todayS=todayStr();
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      const yStr=yesterday.toISOString().slice(0,10);
      const streak=r.lastActiveDate===todayS?r.currentStreak:r.lastActiveDate===yStr?(r.currentStreak||0)+1:1;
      const maxStreak=Math.max(r.maxStreak||0,streak);
      // time badges
      const h=new Date().getHours();
      const mergedStats={...r,...newStats,xp:newXp,currentStreak:streak,maxStreak,lastActiveDate:todayS,nightOwl:r.nightOwl||(h>=22),earlyBird:r.earlyBird||(h<7)};
      const newBadges=checkNewBadges(mergedStats,r.badges||[]);
      const updatedRewards={...mergedStats,badges:[...(r.badges||[]),...newBadges]};
      const updated={...prev,rewards:updatedRewards};
      pwaStorage.set(STORAGE_KEY,JSON.stringify(updated)).catch(()=>{});
      if(newLevel>oldLevel) setTimeout(()=>setLevelUpModal(newLevel),300);
      if(newBadges.length>0) setTimeout(()=>setNewBadge(BADGE_DEFS.find(b=>b.id===newBadges[0])),600);
      setToastXp(amount);
      return updated;
    });
  },[]);

  const processInput=text=>{
    if(!text.trim()||!data)return;
    const d={...data,projects:data.projects||[],notes:data.notes||[]};
    const parsed=parseVoiceInput(text);
    if(parsed.type==="note"){save({...d,notes:[{id:genId(),title:"",body:parsed.data.body.trim(),pinned:false,createdAt:Date.now(),updatedAt:Date.now()},...d.notes]});showToast("Note saved");}
    else if(parsed.type==="todo"){save({...d,todos:[...d.todos,{...parsed.data,id:genId(),completed:false}]});showToast(`Task added: "${parsed.data.title}"`);}
    else if(parsed.type==="event"){save({...d,events:[...d.events,{...parsed.data,id:genId()}]});showToast(`Event added: "${parsed.data.title}"`);}
    else if(parsed.type==="habit"){save({...d,habits:[...d.habits,{...parsed.data,id:genId(),frequency:"daily",daysOfWeek:[0,1,2,3,4,5,6],completions:{},monthlyGoals:{}}]});showToast(QUIPS.habitAdded);}
    else showToast("Try: 'Add note…' · 'Add todo…' · 'Schedule…' · 'Add habit…'");
    setInput("");
  };

  const {activeAlerts,dismiss}=useReminderEngine(data?.events||[],data?.todos||[],data?.projects||[]);

  if(loading||!data)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a0e1a",color:"#38bdf8",fontFamily:"system-ui"}}>Loading…</div>;

  const themeBase=THEMES[data.settings.theme]||THEMES.dark;
  const theme={...themeBase,accent:data.settings.accent||themeBase.accent};
  const safeD={...data,projects:data.projects||[],notes:data.notes||[],habits:(data.habits||[]).map(h=>({...h,monthlyGoals:h.monthlyGoals||{}}))};

  return(
    <div style={{minHeight:"100vh",background:theme.bg,color:theme.text,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",padding:"12px 16px",maxWidth:680,margin:"0 auto",boxSizing:"border-box"}}>
      <ReminderAlert reminders={activeAlerts} accent={theme.accent} onDismiss={dismiss}/>
      {levelUpModal&&<LevelUpModal level={levelUpModal} accent={theme.accent} theme={theme} onClose={()=>setLevelUpModal(null)}/>}
      {showMonthlyPrompt&&(
        <MonthlyReviewModal habits={safeD.habits} theme={theme}
          onClose={()=>{setShowMonthlyPrompt(false);save({...safeD,settings:{...safeD.settings,lastMonthlyReview:monthKey()}});}}
          onSetGoal={goals=>{
            const updated=safeD.habits.map(h=>({...h,monthlyGoals:{...h.monthlyGoals||{},[monthKey()]:goals[h.id]}}));
            save({...safeD,habits:updated,settings:{...safeD.settings,lastMonthlyReview:monthKey()}});
            setShowMonthlyPrompt(false);
          }}
        />
      )}
      {newBadge&&<BadgeToast badge={newBadge} accent={theme.accent} onDismiss={()=>setNewBadge(null)}/>}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <div>
          <div style={{fontSize:"0.63rem",letterSpacing:"0.15em",textTransform:"uppercase",color:theme.muted}}>COMMAND CENTER</div>
          <div style={{fontSize:"0.95rem",fontWeight:700,color:theme.text}}>{getGreeting(safeD.settings.name)}</div>
        </div>
        <button onClick={()=>setShowSettings(s=>!s)} style={{background:"none",border:`1.5px solid ${theme.border}`,borderRadius:8,padding:"6px 10px",color:theme.muted,cursor:"pointer",fontSize:"0.78rem",display:"flex",alignItems:"center",gap:5}}>⚙ Settings</button>
      </div>

      <Clock accent={theme.accent}/>

      <div style={{display:"flex",gap:8,marginBottom:12,marginTop:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")processInput(input);}}
          placeholder="'Add note…' · 'Add todo fix car Thursday' · 'Schedule Pilots game 7pm Friday'"
          style={{flex:1,background:theme.panel,border:`1.5px solid ${theme.border}`,borderRadius:8,padding:"9px 12px",color:theme.text,fontSize:"0.8rem",outline:"none",boxSizing:"border-box"}}/>
        <VoiceButton onTranscript={t=>{setInput(t);setTimeout(()=>processInput(t),100);}} accent={theme.accent}/>
        <button onClick={()=>processInput(input)} style={{background:theme.accent,border:"none",borderRadius:8,padding:"9px 14px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:"0.82rem",flexShrink:0}}>Go</button>
      </div>

      {showSettings&&(
        <div style={{marginBottom:12}}>
          <SettingsPanel settings={safeD.settings} theme={theme} onSave={s=>{save({...safeD,settings:s});setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <TodaySummary events={safeD.events} todos={safeD.todos} habits={safeD.habits} projects={safeD.projects} theme={theme}/>
        <RewardsPanel rewards={safeD.rewards} theme={theme}/>
        <WeatherWidget theme={theme}/>
        <CalendarPanel events={safeD.events} todos={safeD.todos} theme={theme}/>
        <ProjectsPanel
          projects={safeD.projects} theme={theme}
          onSave={projects=>save({...safeD,projects})}
          onDeleteProject={id=>save({...safeD,projects:safeD.projects.filter(p=>p.id!==id)})}
          onMarkStepDone={(projId,stepId)=>{
            save({...safeD,projects:safeD.projects.map(p=>p.id!==projId?p:{...p,lastProgressDate:todayStr(),steps:p.steps.map(s=>s.id===stepId?{...s,done:true}:s)})});
            earnXP(XP_PER_STEP,{totalSteps:(safeD.rewards?.totalSteps||0)+1});
            showToast(pick(QUIPS.stepComplete));
          }}
          onAddToTodo={t=>{save({...safeD,todos:[...safeD.todos,t]});showToast(`Added to To-Do: "${t.title.slice(0,38)}…"`);}}
        />
        <NotesPanel notes={safeD.notes} theme={theme}
          onAdd={n=>save({...safeD,notes:[n,...safeD.notes]})}
          onUpdate={n=>save({...safeD,notes:safeD.notes.map(x=>x.id===n.id?n:x)})}
          onDelete={id=>save({...safeD,notes:safeD.notes.filter(n=>n.id!==id)})}
        />
        <EventsPanel events={safeD.events} theme={theme} onAdd={ev=>save({...safeD,events:[...safeD.events,ev]})} onDelete={id=>save({...safeD,events:safeD.events.filter(e=>e.id!==id)})}/>
        <TodoPanel todos={safeD.todos} theme={theme} onAdd={t=>save({...safeD,todos:[...safeD.todos,t]})} onToggle={id=>{
              const t=safeD.todos.find(t=>t.id===id);
              const completing=t&&!t.completed;
              save({...safeD,todos:safeD.todos.map(t=>t.id===id?{...t,completed:!t.completed}:t)});
              if(completing){earnXP(XP_PER_TODO,{totalTodos:(safeD.rewards?.totalTodos||0)+1});showToast(pick(QUIPS.todoComplete));}
            }} onDelete={id=>save({...safeD,todos:safeD.todos.filter(t=>t.id!==id)})}/>
        <HabitsPanel habits={safeD.habits} theme={theme} onSetGoals={updated=>save({...safeD,habits:updated})} onAdd={h=>save({...safeD,habits:[...safeD.habits,h]})} onToggleDay={(id,date)=>{
              const h=safeD.habits.find(h=>h.id===id);
              const wasOff=h&&!h.completions?.[date];
              save({...safeD,habits:safeD.habits.map(h=>h.id===id?{...h,completions:{...h.completions,[date]:!h.completions?.[date]}}:h)});
              if(wasOff){earnXP(XP_PER_HABIT,{totalHabits:(safeD.rewards?.totalHabits||0)+1});showToast(pick(QUIPS.habitComplete));}
            }} onDelete={id=>save({...safeD,habits:safeD.habits.filter(h=>h.id!==id)})}/>
      </div>

      <div style={{marginTop:12,padding:"8px 12px",background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:8,fontSize:"0.68rem",color:theme.muted,lineHeight:1.7}}>
        <strong style={{color:theme.accent}}>Commands:</strong> "Add note [text]" · "Add todo [task] [priority] [date]" · "Schedule [event] [time] [day]" · "Add habit [name]" · 🎤 mic
      </div>

      {toast&&<Toast message={toast} accent={theme.accent} onDismiss={()=>{setToast(null);setToastXp(null);}} xp={toastXp}/>}
      <AssistantChat data={safeD} theme={theme}/>
    </div>
  );
}


// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
