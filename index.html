// ─── PWA STORAGE (localStorage wrapper matching window.storage API) ───────────
const pwaStorage = {
  get: async (key) => {
    try {
      const val = localStorage.getItem(key);
      return val ? { key, value: val } : null;
    } catch { return null; }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem(key, value);
      return { key, value };
    } catch { return null; }
  },
  delete: async (key) => {
    try { localStorage.removeItem(key); return { key, deleted: true }; }
    catch { return null; }
  },
  list: async (prefix) => {
    try {
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return { keys };
    } catch { return { keys: [] }; }
  }
};

// ─── SERVICE WORKER REGISTRATION ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `const CACHE_NAME = 'jarvis-v1';
const ASSETS = ['/'];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});

self.addEventListener('fetch', e => {
  // Network first, fall back to cache
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});

self.addEventListener('push', e => {
  const data = e.data ? e.data.json() : { title: 'Jarvis', body: 'You have a reminder.' };
  e.waitUntil(
    self.registration.showNotification(data.title || 'Jarvis', {
      body: data.body || '',
      icon: '/icon-192.png',
      badge: '/icon-192.png',
      vibrate: [200, 100, 200],
      tag: data.tag || 'jarvis-notif',
      renotify: true,
    })
  );
});

self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.openWindow('/'));
});
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(e => console.log('SW reg failed:', e));
}

// ─── PUSH NOTIFICATION HELPER ─────────────────────────────────────────────────
window.requestNotificationPermission = async () => {
  if (!('Notification' in window)) return false;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
};
window.sendLocalNotification = (title, body, delay=0) => {
  setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification(title, { body, icon: '', badge: '' });
    }
  }, delay);
};
</script>

// ─── HABIT DATA HELPERS ──────────────────────────────────────────────────────
function monthKey(date){ const d=date||new Date(); return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
function prevMonthKey(mk){ const[y,m]=mk.split("-").map(Number); return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,"0")}`; }
function sameMonthLastYearKey(mk){ const[y,m]=mk.split("-"); return`${parseInt(y)-1}-${m}`; }
function daysInMonthFromKey(mk){ const[y,m]=mk.split("-").map(Number); return new Date(y,m,0).getDate(); }
function daysElapsedInMonth(mk){ const[y,m]=mk.split("-").map(Number); const now=new Date(); if(now.getFullYear()===y&&now.getMonth()===m-1) return now.getDate(); return daysInMonthFromKey(mk); }

function calcHabitMonthRate(habit, mk){
  const[y,m]=mk.split("-").map(Number);
  const days=daysInMonthFromKey(mk);

  if(habit.weeklyTarget){
    // Weekly-target mode: count weeks in month, goal = weeklyTarget per week
    // Count actual completions vs (weeks * weeklyTarget)
    let completions=0, weeks=0;
    let weekStart=null;
    for(let d=1;d<=days;d++){
      const ds=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const dow=new Date(ds+"T12:00:00").getDay();
      if(dow===0) weeks++; // new week (Sunday)
      if(habit.completions?.[ds]) completions++;
    }
    // if month doesn't start on Sunday, still count the first partial week
    const firstDow=new Date(`${y}-${String(m).padStart(2,"0")}-01T12:00:00`).getDay();
    if(firstDow!==0) weeks++;
    const target=weeks*habit.weeklyTarget;
    return target===0?null:Math.round((completions/target)*100);
  }

  // Default: % of scheduled days completed
  let scheduled=0,completed=0;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow=new Date(ds+"T12:00:00").getDay();
    const isScheduled=habit.frequency==="daily"||(habit.daysOfWeek||[]).includes(dow);
    if(isScheduled){ scheduled++; if(habit.completions?.[ds]) completed++; }
  }
  return scheduled===0?null:Math.round((completed/scheduled)*100);
}

function calcGoalForHabit(habit, mk){
  // last month rate
  const prevMk=prevMonthKey(mk);
  const prevRate=calcHabitMonthRate(habit,prevMk);
  // same month last year
  const lastYearMk=sameMonthLastYearKey(mk);
  const lastYearRate=calcHabitMonthRate(habit,lastYearMk);
  if(prevRate===null) return 69; // giggity
  const bump=prevRate>=85?5:prevRate>=70?7:10;
  return Math.min(95,prevRate+bump);
}

function getHabitGoal(habit, mk){
  // stored goal takes precedence; otherwise calculate
  return habit.monthlyGoals?.[mk] ?? calcGoalForHabit(habit,mk);
}

// ─── VOICE PARSER ─────────────────────────────────────────────────────────────
function parseVoiceInput(text){
  const lower=text.toLowerCase(),result={type:null,data:{}};
  const timeMatch=text.match(/\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i);
  const parsedTime=timeMatch?(()=>{ let h=parseInt(timeMatch[1]); const m=timeMatch[2]||"00",ap=timeMatch[3].toLowerCase(); if(ap==="pm"&&h!==12)h+=12; if(ap==="am"&&h===12)h=0; return`${String(h).padStart(2,"0")}:${m}`; })():null;
  const datePatterns=[
    {rx:/\b(today)\b/,fn:()=>todayStr()},
    {rx:/\b(tomorrow)\b/,fn:()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}},
    {rx:/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i,fn:m=>{const t=DAYS_FULL.findIndex(d=>d.toLowerCase()===m.toLowerCase());const now=new Date();let diff=t-now.getDay();if(diff<=0)diff+=7;const d=new Date();d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);}},
    {rx:/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/,fn:(m,full)=>{const mm=full.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);if(!mm)return null;const y=mm[3]?(mm[3].length===2?"20"+mm[3]:mm[3]):new Date().getFullYear().toString();return`${y}-${mm[1].padStart(2,"0")}-${mm[2].padStart(2,"0")}`;}}
  ];
  let parsedDate=null;
  for(const p of datePatterns){const m=lower.match(p.rx);if(m){parsedDate=p.fn(m[1],text);break;}}
  if(/\b(add note|note down|jot|remember that)\b/.test(lower)){
    const body=text.replace(/add note|note down|jot|remember that/gi,"").trim();
    result.type="note";result.data={body};
  } else if(/\b(add todo|add task|remind me to|don't forget|remember to)\b/.test(lower)){
    let title=text.replace(/add todo|add task|remind me to|don't forget|remember to/gi,"").trim();
    if(parsedTime)title=title.replace(timeMatch[0],"").trim();
    if(parsedDate)title=title.replace(/(today|tomorrow|monday|tuesday|wednesday|thursday|friday|saturday|sunday)/gi,"").trim();
    title=title.replace(/\s+/g," ").trim();
    const priority=lower.includes("urgent")||lower.includes("high priority")?"high":lower.includes("low priority")?"low":"medium";
    result.type="todo";result.data={title,priority,dueDate:parsedDate||"",dueTime:parsedTime||""};
  } else if(/\b(add event|schedule|game|appointment|meeting)\b/.test(lower)){
    let title=text.replace(/add event|schedule/gi,"").trim();
    if(parsedTime)title=title.replace(timeMatch[0],"").trim();
    if(parsedDate)title=title.replace(/(today|tomorrow|monday|tuesday|wednesday|thursday|friday|saturday|sunday)/gi,"").trim();
    title=title.replace(/\s+/g," ").trim();
    const cat=lower.includes("game")?"game":lower.includes("appointment")?"appointment":lower.includes("work")?"work":"other";
    result.type="event";result.data={title,date:parsedDate||todayStr(),time:parsedTime||"",category:cat};
  } else if(/\b(add habit|track|daily)\b/.test(lower)){
    result.type="habit";result.data={title:text.replace(/add habit|track|daily/gi,"").trim()};
  }
  return result;
}

// ─── VOICE BUTTON ─────────────────────────────────────────────────────────────
function VoiceButton({onTranscript,accent}){
  const [listening,setListening]=useState(false);
  const [supported]=useState(()=>"webkitSpeechRecognition" in window||"SpeechRecognition" in window);
  const recRef=useRef(null);
  const toggle=()=>{
    if(!supported){alert("Voice input not supported. Try Chrome.");return;}
    if(listening){recRef.current?.stop();setListening(false);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();rec.lang="en-US";rec.interimResults=false;rec.maxAlternatives=1;
    rec.onresult=e=>{onTranscript(e.results[0][0].transcript);setListening(false);};
    rec.onerror=()=>setListening(false);rec.onend=()=>setListening(false);
    rec.start();recRef.current=rec;setListening(true);
  };
  return(
    <button onClick={toggle} title={listening?"Stop":"Voice"} style={{background:listening?accent:"transparent",border:`1.5px solid ${listening?accent:"#334155"}`,borderRadius:"50%",width:36,height:36,cursor:"pointer",color:listening?"#000":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0}}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v1a7 7 0 0 1-14 0v-1" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round"/>
        <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
        <line x1="8"  y1="23" x2="16" y2="23" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
      </svg>
    </button>
  );
}

// ─── REMINDER ENGINE ──────────────────────────────────────────────────────────
function useReminderEngine(events,todos,projects){
  const [activeAlerts,setActiveAlerts]=useState([]);
  const dismissedRef=useRef(new Set());
  useEffect(()=>{
    const check=()=>{
      const now=new Date(),nowStr=now.toISOString().slice(0,10),nowH=now.getHours(),nowM=now.getMinutes(),alerts=[];
      events.forEach(ev=>{
        if(!ev.time||ev.date!==nowStr)return;
        const[eh,em]=ev.time.split(":").map(Number),evMins=eh*60+em,nowMins=nowH*60+nowM,diff=evMins-nowMins;
        if(diff>0&&diff<=30){const k=`event-${ev.id}-pre`;if(!dismissedRef.current.has(k))alerts.push({id:k,title:`${ev.title} in ${diff} min`,time:ev.time});}
        if(diff===0){const k=`event-${ev.id}-now`;if(!dismissedRef.current.has(k))alerts.push({id:k,title:`Starting now: ${ev.title}`,time:ev.time});}
      });
      todos.filter(t=>!t.completed).forEach(t=>{
        if(!t.dueDate||t.dueDate!==nowStr)return;
        const[ah,am]=t.dueTime?t.dueTime.split(":").map(Number):[9,0];
        if(nowH===ah&&nowM===am){const k=`todo-${t.id}-due`;if(!dismissedRef.current.has(k))alerts.push({id:k,title:`Due today: ${t.title}`,time:t.dueTime||""});}
      });
      // Project nudges
      (projects||[]).filter(p=>p.status==="active"&&p.nudgeDays).forEach(p=>{
        const last=p.lastProgressDate?new Date(p.lastProgressDate):null;
        const daysSince=last?Math.floor((Date.now()-last.getTime())/86400000):999;
        const neverStarted=p.steps.every(s=>!s.done);
        if(daysSince>=p.nudgeDays){
          const k=`nudge-${p.id}-${nowStr}`;
          if(!dismissedRef.current.has(k)){
            const msg=neverStarted?quip("nudge",{project:p.title,days:"?"}):quip("nudge",{project:p.title,days:daysSince});
            alerts.push({id:k,title:msg,time:"",type:"nudge"});
          }
        }
      });
      if(alerts.length)setActiveAlerts(prev=>{const ids=new Set(prev.map(a=>a.id));const nn=alerts.filter(a=>!ids.has(a.id));return nn.length?[...prev,...nn]:prev;});
    };
    check();const iv=setInterval(check,30000);return()=>clearInterval(iv);
  },[events,todos]);
  const dismiss=id=>{dismissedRef.current.add(id);setActiveAlerts(prev=>prev.filter(a=>a.id!==id));};
  return{activeAlerts,dismiss};
}

// ─── WEATHER WIDGET ───────────────────────────────────────────────────────────
function WeatherWidget({theme}){
  const [wx,setWx]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [lastFetch,setLastFetch]=useState(null);

  const fetchWeather=useCallback(()=>{
    if(!navigator.geolocation){setError("Geolocation not supported");return;}
    setLoading(true);setError(null);
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const {latitude:lat,longitude:lon}=pos.coords;
        const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=5`;
        const res=await fetch(url);
        const d=await res.json();
        setWx(d);setLastFetch(Date.now());
      }catch{setError("Failed to load weather");}
      finally{setLoading(false);}
    },()=>{setError("Location permission denied");setLoading(false);});
  },[]);

  useEffect(()=>{fetchWeather();},[]);

  const wmoIcon=(code)=>{
    if(code===0)return"☀️";
    if(code<=2)return"🌤️";
    if(code<=3)return"☁️";
    if(code<=49)return"🌫️";
    if(code<=59)return"🌦️";
    if(code<=69)return"🌧️";
    if(code<=79)return"🌨️";
    if(code<=84)return"🌧️";
    if(code<=99)return"⛈️";
    return"🌡️";
  };
  const wmoDesc=(code)=>{
    if(code===0)return"Clear";if(code<=2)return"Partly cloudy";if(code<=3)return"Overcast";
    if(code<=49)return"Foggy";if(code<=59)return"Drizzle";if(code<=69)return"Rain";
    if(code<=79)return"Snow";if(code<=84)return"Rain showers";if(code<=99)return"Thunderstorm";
    return"Unknown";
  };

  if(loading)return(
    <div style={{background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:10,padding:14,display:"flex",alignItems:"center",gap:10,color:theme.muted,fontSize:"0.82rem"}}>
      <span style={{fontSize:"1.2rem"}}>🌡️</span> Detecting location…
    </div>
  );
  if(error)return(
    <div style={{background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:10,padding:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <span style={{color:theme.muted,fontSize:"0.8rem"}}>⚠️ {error}</span>
      <button onClick={fetchWeather} style={{background:theme.accent,border:"none",borderRadius:6,padding:"4px 10px",color:"#000",fontSize:"0.72rem",fontWeight:700,cursor:"pointer"}}>Retry</button>
    </div>
  );
  if(!wx)return null;

  const cur=wx.current;
  const daily=wx.daily;
  const dayNames=daily.time.slice(0,5).map((d,i)=>i===0?"Today":i===1?"Tomorrow":DAYS[new Date(d+"T12:00:00").getDay()]);

  return(
    <div style={{background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:10,padding:14}}>
      <SectionHeader title="Weather" accent={theme.accent} action={
        <button onClick={fetchWeather} style={{background:"none",border:`1px solid ${theme.border}`,borderRadius:6,color:theme.muted,cursor:"pointer",fontSize:"0.72rem",padding:"3px 8px"}}>↻ Refresh</button>
      }/>
      {/* Current conditions */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:12}}>
        <div style={{fontSize:"3rem",lineHeight:1}}>{wmoIcon(cur.weather_code)}</div>
        <div>
          <div style={{fontSize:"2rem",fontWeight:700,color:theme.text,lineHeight:1}}>{Math.round(cur.temperature_2m)}°F</div>
          <div style={{fontSize:"0.8rem",color:theme.muted}}>Feels like {Math.round(cur.apparent_temperature)}°F · {wmoDesc(cur.weather_code)}</div>
          <div style={{fontSize:"0.75rem",color:theme.muted,marginTop:2}}>
            💧{cur.relative_humidity_2m}% · 💨{Math.round(cur.wind_speed_10m)}mph · 🌧{cur.precipitation_probability}%
          </div>
        </div>
        {lastFetch&&<div style={{marginLeft:"auto",fontSize:"0.65rem",color:theme.muted,alignSelf:"flex-start"}}>{timeAgo(lastFetch)}</div>}
      </div>
      {/* 5-day forecast */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
        {dayNames.map((name,i)=>(
          <div key={i} style={{background:theme.bg,borderRadius:7,padding:"8px 4px",textAlign:"center"}}>
            <div style={{fontSize:"0.65rem",color:theme.muted,marginBottom:3,fontWeight:600}}>{name}</div>
            <div style={{fontSize:"1.1rem",lineHeight:1,marginBottom:3}}>{wmoIcon(daily.weather_code[i])}</div>
            <div style={{fontSize:"0.72rem",fontWeight:700,color:theme.text}}>{Math.round(daily.temperature_2m_max[i])}°</div>
            <div style={{fontSize:"0.65rem",color:theme.muted}}>{Math.round(daily.temperature_2m_min[i])}°</div>
            {daily.precipitation_probability_max[i]>20&&(
              <div style={{fontSize:"0.6rem",color:"#38bdf8",marginTop:2}}>🌧{daily.precipitation_probability_max[i]}%</div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── NOTES PANEL ─────────────────────────────────────────────────────────────
function NotesPanel({notes,theme,onAdd,onUpdate,onDelete}){
  const [showNew,setShowNew]=useState(false);
  const [editing,setEditing]=useState(null);
  const [body,setBody]=useState("");
  const [title,setTitle]=useState("");
  const [pinned,setPinned]=useState(false);
  const [search,setSearch]=useState("");

  const openNew=()=>{setTitle("");setBody("");setPinned(false);setShowNew(true);setEditing(null);};
  const openEdit=n=>{setTitle(n.title||"");setBody(n.body);setPinned(!!n.pinned);setEditing(n.id);setShowNew(true);};
  const save=()=>{
    if(!body.trim())return;
    if(editing){onUpdate({...notes.find(n=>n.id===editing),title:title.trim(),body:body.trim(),pinned,updatedAt:Date.now()});}
    else{onAdd({id:genId(),title:title.trim(),body:body.trim(),pinned,createdAt:Date.now(),updatedAt:Date.now()});}
    setShowNew(false);setEditing(null);
  };

  const filtered=notes
    .filter(n=>!search||(n.title+n.body).toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.updatedAt||0)-(a.updatedAt||0));

  const pinned_notes=filtered.filter(n=>n.pinned);
  const regular=filtered.filter(n=>!n.pinned);

  const NoteCard=({n})=>(
    <div onClick={()=>openEdit(n)} style={{background:NOTE_COLORS[Math.abs(n.id.charCodeAt(0))%NOTE_COLORS.length],border:`1px solid ${theme.border}`,borderRadius:8,padding:"10px 12px",cursor:"pointer",position:"relative",transition:"transform 0.1s"}}>
      {n.pinned&&<span style={{position:"absolute",top:6,right:8,fontSize:"0.7rem"}}>📌</span>}
      {n.title&&<div style={{fontSize:"0.82rem",fontWeight:700,color:theme.text,marginBottom:4,paddingRight:16}}>{n.title}</div>}
      <div style={{fontSize:"0.78rem",color:"#94a3b8",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{n.body}</div>
      <div style={{fontSize:"0.63rem",color:theme.muted,marginTop:6}}>{timeAgo(n.updatedAt||n.createdAt||0)}</div>
    </div>
  );

  return(
    <div style={{background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:10,padding:14}}>
      <SectionHeader title={`Notes${notes.length?" ("+notes.length+")":""}`} accent={theme.accent} action={
        <button onClick={openNew} style={{background:theme.accent,border:"none",borderRadius:6,color:"#000",fontSize:"0.75rem",fontWeight:700,padding:"4px 10px",cursor:"pointer"}}>+ Note</button>
      }/>
      {notes.length>3&&(
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search notes…"
          style={{width:"100%",background:theme.bg,border:`1px solid ${theme.border}`,borderRadius:7,padding:"7px 10px",color:theme.text,fontSize:"0.8rem",marginBottom:10,boxSizing:"border-box",outline:"none"}}/>
      )}
      {filtered.length===0&&<p style={{color:theme.muted,fontSize:"0.8rem",textAlign:"center",padding:"8px 0"}}>Nothing here. Suspiciously clean. Your brain has thoughts — capture them.</p>}
      {pinned_notes.length>0&&(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:"0.65rem",color:theme.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Pinned</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{pinned_notes.map(n=><NoteCard key={n.id} n={n}/>)}</div>
        </div>
      )}
      {regular.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{regular.map(n=><NoteCard key={n.id} n={n}/>)}</div>
      )}
      {showNew&&(
        <Modal title={editing?"Edit Note":"New Note"} onClose={()=>{setShowNew(false);setEditing(null);}} theme={theme}>
          <Inp label="Title (optional)" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Quick title…"/>
          <Inp label="Note" as="textarea" value={body} onChange={e=>setBody(e.target.value)} placeholder="Write anything…" minHeight={120}/>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <button onClick={()=>setPinned(p=>!p)} style={{background:pinned?`${theme.accent}22`:"transparent",border:`1px solid ${pinned?theme.accent:theme.border}`,borderRadius:6,padding:"5px 10px",color:pinned?theme.accent:theme.muted,cursor:"pointer",fontSize:"0.78rem"}}>
              {pinned?"📌 Pinned":"📌 Pin note"}
            </button>
            {editing&&<button onClick={()=>{onDelete(editing);setShowNew(false);setEditing(null);}} style={{marginLeft:"auto",background:"none",border:"1px solid #ef444433",borderRadius:6,color:"#ef4444",cursor:"pointer",fontSize:"0.72rem",padding:"5px 10px",opacity:0.8}}>Delete</button>}
          </div>
          <button onClick={save} style={{width:"100%",background:theme.accent,border:"none",borderRadius:8,padding:"10px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:"0.9rem"}}>Save Note</button>
        </Modal>
      )}
    </div>
  );
}

          <span style={{fontSize:"0.78rem",fontWeight:700,color:theme.text,minWidth:106,textAlign:"center"}}>{MONTHS[viewMonth]} {viewYear}</span>

      }/>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((day,i)=>{
          if(!day)return <div key={`e${i}`}/>;
          const d=ds(day),isToday=d===todayS,isSel=d===selected;
          const dots=[...eventsFor(day).map(e=>CATEGORY_COLORS[e.category]||"#64748b"),...todosFor(day).map(()=>PRIORITY_COLORS.medium)].slice(0,3);
          return(
            <div key={d} onClick={()=>setSelected(d)} style={{textAlign:"center",padding:"5px 2px 4px",borderRadius:7,cursor:"pointer",background:isSel?theme.accent:isToday?`${theme.accent}22`:"transparent",border:isToday&&!isSel?`1px solid ${theme.accent}`:"1px solid transparent",transition:"background 0.15s"}}>

          );

        <div style={{marginTop:10,borderTop:`1px solid ${theme.border}`,paddingTop:10}}>

          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {selEvs.map(ev=>(
              <div key={ev.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",background:theme.bg,borderRadius:6,borderLeft:`3px solid ${CATEGORY_COLORS[ev.category]||"#64748b"}`}}>
                <span>{CATEGORY_ICONS[ev.category]||"📌"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.8rem",fontWeight:600,color:theme.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                  {ev.time&&<div style={{fontSize:"0.68rem",color:theme.muted}}>{formatTime(ev.time)}</div>}
                </div>
                <span style={{fontSize:"0.62rem",padding:"1px 5px",borderRadius:4,background:`${CATEGORY_COLORS[ev.category]}22`,color:CATEGORY_COLORS[ev.category],textTransform:"capitalize",flexShrink:0}}>{ev.category}</span>
              </div>
            ))}
            {selTodos.map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",background:theme.bg,borderRadius:6,borderLeft:`3px solid ${PRIORITY_COLORS[t.priority]}`}}>
                <span>✅</span>
                <div style={{flex:1,fontSize:"0.8rem",color:theme.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                <span style={{fontSize:"0.62rem",padding:"1px 5px",borderRadius:4,background:`${PRIORITY_COLORS[t.priority]}22`,color:PRIORITY_COLORS[t.priority],textTransform:"capitalize",flexShrink:0}}>{t.priority}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {selected&&selEvs.length===0&&selTodos.length===0&&(
        <div style={{marginTop:8,borderTop:`1px solid ${theme.border}`,paddingTop:8,fontSize:"0.75rem",color:theme.muted,textAlign:"center"}}>Nothing on {formatDate(selected)}</div>
      )}
      <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:"5px 10px"}}>
        {Object.entries(CATEGORY_COLORS).map(([k,c])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:c}}/>
            <span style={{fontSize:"0.63rem",color:theme.muted,textTransform:"capitalize"}}>{k}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

    .sort((a,b)=>{const po={high:0,medium:1,low:2};if(a.completed!==b.completed)return a.completed?1:-1;return(po[a.priority]||1)-(po[b.priority]||1);});

              <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?theme.accent:"none",border:"none",borderRadius:4,padding:"2px 7px",fontSize:"0.63rem",color:filter===f?"#000":theme.muted,cursor:"pointer",fontWeight:filter===f?700:400,textTransform:"capitalize"}}>{f}</button>

// ─── MONTHLY REVIEW MODAL ────────────────────────────────────────────────────
function MonthlyReviewModal({habits, theme, onClose, onSetGoal}){
  const mk=monthKey();
  const prevMk=prevMonthKey(mk);
  const lastYearMk=sameMonthLastYearKey(mk);
  const now=new Date();
  const monthName=MONTHS[now.getMonth()];
  const [goals,setGoals]=useState(()=>{
    const g={};
    habits.forEach(h=>{g[h.id]=getHabitGoal(h,mk);});
    return g;
  });

  const rows=habits.map(h=>{
    const prevRate=calcHabitMonthRate(h,prevMk);
    const lyRate=calcHabitMonthRate(h,lastYearMk);
    const suggested=calcGoalForHabit(h,mk);
    return{h,prevRate,lyRate,suggested,goal:goals[h.id]??suggested};
  });

  const save=()=>{
    onSetGoal(goals);
    onClose();
  };

  const barColor=(rate,goal)=>{
    if(rate===null)return"#334155";
    if(rate>=goal)return"#22c55e";
    if(rate>=goal*0.8)return"#f59e0b";
    return"#ef4444";
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{background:theme.panel,border:`1.5px solid ${theme.accent}`,borderRadius:14,padding:20,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:"1.4rem",marginBottom:4}}>📊</div>
          <div style={{fontSize:"1.1rem",fontWeight:800,color:theme.accent}}>Monthly Goal Review</div>
          <div style={{fontSize:"0.8rem",color:theme.muted,marginTop:4}}>{pick(QUIPS.monthlyReview)}</div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {rows.map(({h,prevRate,lyRate,suggested,goal})=>{
            const curRate=calcHabitMonthRate(h,mk);
            const daysElapsed=daysElapsedInMonth(mk);
            const daysTotal=daysInMonthFromKey(mk);
            return(
              <div key={h.id} style={{background:theme.bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${theme.border}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:"0.88rem",fontWeight:700,color:theme.text}}>{h.title}</span>
                  {curRate!==null&&(
                    <span style={{fontSize:"0.72rem",color:barColor(curRate,goal),fontWeight:700}}>{curRate}% so far</span>
                  )}
                </div>

                {/* Comparison row */}
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  {[
                    {label:"Last month",val:prevRate,mk:prevMk},
                    {label:"Same month last year",val:lyRate,mk:lastYearMk},
                    {label:`${monthName} so far`,val:curRate,mk:mk,current:true},
                  ].map(({label,val,current})=>(
                    <div key={label} style={{flex:1,background:theme.panel,borderRadius:7,padding:"6px 8px",textAlign:"center",border:current?`1px solid ${theme.accent}44`:"none"}}>
                      <div style={{fontSize:"0.62rem",color:theme.muted,marginBottom:3,lineHeight:1.3}}>{label}</div>
                      {val===null
                        ?<div style={{fontSize:"0.75rem",color:theme.muted}}>—</div>
                        :<div style={{fontSize:"0.95rem",fontWeight:700,color:barColor(val,goal)}}>{val}%</div>
                      }
                    </div>
                  ))}
                </div>

                {/* Goal setter */}
                <div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:"0.7rem",color:theme.muted}}>{monthName} goal</span>
                    <span style={{fontSize:"0.78rem",fontWeight:700,color:theme.accent}}>{goals[h.id]??suggested}%</span>
                  </div>
                  <input type="range" min={10} max={100} step={1}
                    value={goals[h.id]??suggested}
                    onChange={e=>setGoals(g=>({...g,[h.id]:Number(e.target.value)}))}
                    style={{width:"100%",accentColor:theme.accent}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.62rem",color:theme.muted}}>
                    <span>10%</span>
                    <span style={{color:"#facc15"}}>
                      {h.weeklyTarget?`Target: ${h.weeklyTarget}x/week`:`Suggested: ${suggested}%${suggested===69?" 👀":""}`}
                    </span>
                    <span>100%</span>
                  </div>
                </div>

                {/* Progress bar for current month */}
                {curRate!==null&&(
                  <div style={{marginTop:8}}>
                    <div style={{height:5,background:theme.panel,borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",background:barColor(curRate,goals[h.id]??suggested),borderRadius:4,width:`${Math.min(100,curRate)}%`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:"0.62rem",color:theme.muted,marginTop:2,textAlign:"right"}}>{daysElapsed}/{daysTotal} days tracked</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <button onClick={save} style={{width:"100%",background:theme.accent,border:"none",borderRadius:9,padding:"11px",color:"#000",fontWeight:800,cursor:"pointer",fontSize:"0.9rem"}}>
          Lock In Goals 🔒
        </button>
        <button onClick={onClose} style={{width:"100%",background:"none",border:"none",color:theme.muted,cursor:"pointer",fontSize:"0.75rem",marginTop:8,padding:"4px"}}>
          Not now — remind me later
        </button>
      </div>
    </div>
  );
}

function HabitsPanel({habits,theme,onAdd,onToggleDay,onDelete,onSetGoals}){

          <button onClick={()=>setShowModal(true)} style={{background:theme.accent,border:"none",borderRadius:6,color:"#000",fontSize:"0.75rem",fontWeight:700,padding:"4px 10px",cursor:"pointer"}}>+ Add</button>

      }/>
      <div style={{height:4,background:theme.bg,borderRadius:4,marginBottom:10}}>

            const mk=monthKey();

      )}
      {showReview&&(
        <MonthlyReviewModal habits={habits} theme={theme}
          onClose={()=>setShowReview(false)}
          onSetGoal={goals=>{
            const updated=habits.map(h=>({...h,monthlyGoals:{...h.monthlyGoals||{},[monthKey()]:goals[h.id]}}));
            onSetGoals(updated);
          }}
        />
      )}
      {showModal&&(
        <Modal title="Add Habit" onClose={()=>setShowModal(false)} theme={theme}>
          <Inp label="Habit Name" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Stretch before bed"/>
          <Inp label="Frequency" as="select" value={form.frequency} onChange={e=>setForm({...form,frequency:e.target.value})}>
            <option value="daily">Daily</option><option value="weekly">Specific Days</option>
          </Inp>
          {form.frequency==="weekly"&&(
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>Days</label>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {DAYS.map((d,i)=><button key={i} onClick={()=>toggleDow(i)} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${form.daysOfWeek.includes(i)?theme.accent:theme.border}`,background:form.daysOfWeek.includes(i)?`${theme.accent}22`:"transparent",color:form.daysOfWeek.includes(i)?theme.accent:theme.muted,cursor:"pointer",fontSize:"0.75rem"}}>{d}</button>)}
              </div>
            </div>
          )}
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>Weekly Target (optional)</label>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{display:"flex",gap:4}}>
                {[null,1,2,3,4,5,6,7].map(n=>(
                  <button key={String(n)} onClick={()=>setForm(f=>({...f,weeklyTarget:n}))}
                    style={{padding:"4px 8px",borderRadius:6,border:`1.5px solid ${form.weeklyTarget===n?theme.accent:theme.border}`,background:form.weeklyTarget===n?`${theme.accent}22`:"transparent",color:form.weeklyTarget===n?theme.accent:theme.muted,cursor:"pointer",fontSize:"0.73rem",fontWeight:form.weeklyTarget===n?700:400}}>
                    {n===null?"Any":n+"x"}
                  </button>
                ))}
              </div>
            </div>
            {form.weeklyTarget&&<div style={{fontSize:"0.68rem",color:theme.muted,marginTop:4}}>Goal: hit this habit {form.weeklyTarget}x per week</div>}
          </div>
          <button onClick={save} style={{width:"100%",background:theme.accent,border:"none",borderRadius:8,padding:"10px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:"0.9rem",marginTop:4}}>Save Habit</button>
        </Modal>
      )}
    </div>
  );
}

// ─── STEP EDITOR ─────────────────────────────────────────────────────────────
function StepEditor({steps,type,theme,onChange}){
  const addStep=()=>onChange([...steps,{id:genId(),title:"",energy:"medium",mins:30,done:false,notes:""}]);
  const update=(id,f,v)=>onChange(steps.map(s=>s.id===id?{...s,[f]:v}:s));
  const remove=id=>onChange(steps.filter(s=>s.id!==id));
  const move=(idx,dir)=>{const a=[...steps],t=idx+dir;if(t<0||t>=a.length)return;[a[idx],a[t]]=[a[t],a[idx]];onChange(a);};
  return(
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>{type==="linear"?"Steps (ordered)":"Tasks (any order)"}</label>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {steps.map((s,idx)=>(
          <div key={s.id} style={{background:theme.bg,borderRadius:8,padding:"10px",border:`1px solid ${theme.border}`}}>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              {type==="linear"&&(
                <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                  <button onClick={()=>move(idx,-1)} disabled={idx===0} style={{background:"none",border:`1px solid ${theme.border}`,borderRadius:4,color:theme.muted,cursor:idx===0?"not-allowed":"pointer",fontSize:"0.65rem",padding:"0 5px",opacity:idx===0?0.3:1}}>▲</button>
                  <button onClick={()=>move(idx,1)} disabled={idx===steps.length-1} style={{background:"none",border:`1px solid ${theme.border}`,borderRadius:4,color:theme.muted,cursor:idx===steps.length-1?"not-allowed":"pointer",fontSize:"0.65rem",padding:"0 5px",opacity:idx===steps.length-1?0.3:1}}>▼</button>
                </div>
              )}
              <input value={s.title} onChange={e=>update(s.id,"title",e.target.value)} placeholder={`Step ${idx+1}…`}
                style={{flex:1,background:"#1a2540",border:"1px solid #2d3f5a",borderRadius:6,padding:"6px 8px",color:"#e2e8f0",fontSize:"0.82rem",minWidth:0}}/>
              <button onClick={()=>remove(s.id)} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:"0.9rem",flexShrink:0,padding:"0 4px"}}>✕</button>
            </div>
            <div style={{display:"flex",gap:6}}>
              <select value={s.energy} onChange={e=>update(s.id,"energy",e.target.value)}
                style={{flex:1,background:"#1a2540",border:"1px solid #2d3f5a",borderRadius:6,padding:"5px 6px",color:ENERGY_COLORS[s.energy],fontSize:"0.75rem"}}>
                <option value="low">🔵 Low effort</option>
                <option value="medium">🟠 Moderate</option>
                <option value="high">🔴 High focus</option>
              </select>
              <select value={s.mins} onChange={e=>update(s.id,"mins",Number(e.target.value))}
                style={{flex:1,background:"#1a2540",border:"1px solid #2d3f5a",borderRadius:6,padding:"5px 6px",color:"#e2e8f0",fontSize:"0.75rem"}}>
                {TIME_SLOTS.map(t=><option key={t} value={t}>{fmtMins(t)}</option>)}
              </select>
            </div>
          </div>
        ))}
        <button onClick={addStep} style={{background:"transparent",border:`1px dashed ${theme.border}`,borderRadius:8,padding:"8px",color:theme.muted,cursor:"pointer",fontSize:"0.8rem",textAlign:"center"}}>+ Add step</button>
      </div>
    </div>
  );
}

// ─── WHAT CAN I DO ────────────────────────────────────────────────────────────
function WhatCanIDoModal({projects,theme,onClose,onAddToTodo}){
  const [availMins,setAvailMins]=useState(60);
  const active=projects.filter(p=>p.status==="active");
  const suggestions=active.flatMap(p=>{
    if(p.type==="linear"){const next=p.steps.find(s=>!s.done);return next&&next.mins<=availMins?[{project:p,step:next,isNext:true}]:[];}
    return p.steps.filter(s=>!s.done&&s.mins<=availMins).map(s=>({project:p,step:s,isNext:false}));
  }).sort((a,b)=>a.step.mins-b.step.mins);
  const low=suggestions.filter(s=>s.step.energy==="low"),med=suggestions.filter(s=>s.step.energy==="medium"),hi=suggestions.filter(s=>s.step.energy==="high");
  const Card=({item})=>(
    <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:theme.bg,borderRadius:8,borderLeft:`3px solid ${item.project.color||theme.accent}`}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
          <span style={{fontSize:"0.7rem",fontWeight:700,color:item.project.color||theme.accent,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.project.title}</span>
          {item.isNext&&<span style={{fontSize:"0.6rem",background:`${theme.accent}22`,color:theme.accent,padding:"1px 5px",borderRadius:4,flexShrink:0}}>NEXT</span>}
        </div>
        <div style={{fontSize:"0.83rem",color:theme.text,marginBottom:4,lineHeight:1.35}}>{item.step.title}</div>
        <div style={{display:"flex",gap:8}}>
          <span style={{fontSize:"0.68rem",color:ENERGY_COLORS[item.step.energy]}}>{ENERGY_LABELS[item.step.energy]}</span>
          <span style={{fontSize:"0.68rem",color:theme.muted}}>⏱ {fmtMins(item.step.mins)}</span>
        </div>
      </div>
      <button onClick={()=>onAddToTodo({id:genId(),title:`[${item.project.title}] ${item.step.title}`,priority:"medium",dueDate:"",dueTime:"",completed:false})}
        style={{background:item.project.color||theme.accent,border:"none",borderRadius:6,padding:"5px 10px",color:"#000",fontSize:"0.72rem",fontWeight:700,cursor:"pointer",flexShrink:0}}>+ To-Do</button>
    </div>
  );
  const Sec=({label,items})=>items.length===0?null:(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:"0.7rem",fontWeight:700,color:theme.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>{label}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>{items.map((item,i)=><Card key={i} item={item}/>)}</div>
    </div>
  );
  return(
    <Modal title="What can I work on?" onClose={onClose} theme={theme}>
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:8}}>How much free time?</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[15,30,45,60,90,120].map(m=>(
            <button key={m} onClick={()=>setAvailMins(m)} style={{padding:"6px 12px",borderRadius:7,border:`1.5px solid ${availMins===m?theme.accent:theme.border}`,background:availMins===m?`${theme.accent}22`:"transparent",color:availMins===m?theme.accent:theme.muted,cursor:"pointer",fontSize:"0.78rem",fontWeight:availMins===m?700:400}}>{fmtMins(m)}</button>
          ))}
        </div>
      </div>
      {suggestions.length===0
        ?<div style={{textAlign:"center",padding:"20px 0",color:theme.muted,fontSize:"0.85rem"}}>No steps fit in {fmtMins(availMins)}.<br/>Try a longer window.</div>
        :<><Sec label="Low effort — just get it done" items={low}/><Sec label="Moderate effort" items={med}/><Sec label="High focus — bring your A-game" items={hi}/></>}
    </Modal>
  );
}

// ─── PROJECTS PANEL ───────────────────────────────────────────────────────────
function ProjectsPanel({projects,theme,onSave,onDeleteProject,onMarkStepDone,onAddToTodo}){
  const [expanded,setExpanded]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [showEdit,setShowEdit]=useState(null);
  const [showWhat,setShowWhat]=useState(false);
  const [form,setForm]=useState({title:"",description:"",type:"linear",color:PROJECT_COLORS[0],status:"active",steps:[]});
  const active=projects.filter(p=>p.status==="active"),paused=projects.filter(p=>p.status==="paused"),done=projects.filter(p=>p.status==="complete");
  const openNew=()=>{setForm({title:"",description:"",type:"linear",color:PROJECT_COLORS[Math.floor(Math.random()*PROJECT_COLORS.length)],status:"active",nudgeDays:null,steps:[]});setShowNew(true);setShowEdit(null);};
  const openEdit=p=>{setForm({...p,nudgeDays:p.nudgeDays||null,steps:[...p.steps.map(s=>({...s}))]});setShowEdit(p.id);setShowNew(false);};
  const saveForm=()=>{
    if(!form.title.trim())return;
    if(showEdit){onSave(projects.map(p=>p.id===showEdit?{...form,id:p.id}:p));setShowEdit(null);}
    else{onSave([...projects,{...form,id:genId()}]);setShowNew(false);}
  };
  const progressOf=p=>!p.steps.length?0:Math.round((p.steps.filter(s=>s.done).length/p.steps.length)*100);
  const nextStepOf=p=>p.type==="linear"?p.steps.find(s=>!s.done)||null:p.steps.filter(s=>!s.done)[0]||null;

  const FormContent=()=>(
    <>
      <Inp label="Project Name" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Learn Spanish"/>
      <Inp label="Description (optional)" as="textarea" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="What is this about?"/>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>Color</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{PROJECT_COLORS.map(c=><button key={c} onClick={()=>setForm({...form,color:c})} style={{width:24,height:24,borderRadius:"50%",background:c,border:`3px solid ${form.color===c?"#fff":"transparent"}`,cursor:"pointer",padding:0}}/>)}</div>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>Type</label>
        <div style={{display:"flex",gap:6}}>
          {[["linear","📋 Linear"],["flexible","🎯 Flexible"]].map(([v,l])=>(
            <button key={v} onClick={()=>setForm({...form,type:v})} style={{flex:1,padding:"8px 6px",borderRadius:7,border:`1.5px solid ${form.type===v?theme.accent:theme.border}`,background:form.type===v?`${theme.accent}11`:"transparent",color:form.type===v?theme.accent:theme.muted,cursor:"pointer",fontSize:"0.78rem",textAlign:"center"}}>{l}</button>
          ))}
        </div>
      </div>
      <Inp label="Status" as="select" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
        <option value="active">Active</option><option value="paused">Paused</option><option value="complete">Complete</option>
      </Inp>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>Inactivity Nudge</label>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{display:"flex",gap:4}}>
            {[null,2,3,5,7,14].map(d=>(
              <button key={String(d)} onClick={()=>setForm({...form,nudgeDays:d})}
                style={{padding:"5px 9px",borderRadius:6,border:`1.5px solid ${form.nudgeDays===d?theme.accent:theme.border}`,background:form.nudgeDays===d?`${theme.accent}22`:"transparent",color:form.nudgeDays===d?theme.accent:theme.muted,cursor:"pointer",fontSize:"0.73rem",fontWeight:form.nudgeDays===d?700:400}}>
                {d===null?"Off":`${d}d`}
              </button>
            ))}
          </div>
        </div>
        {form.nudgeDays&&<div style={{fontSize:"0.68rem",color:theme.muted,marginTop:4}}>Reminder fires if no progress for {form.nudgeDays} days</div>}
      </div>
      <StepEditor steps={form.steps} type={form.type} theme={theme} onChange={steps=>setForm({...form,steps})}/>
      <button onClick={saveForm} style={{width:"100%",background:theme.accent,border:"none",borderRadius:8,padding:"10px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:"0.9rem",marginTop:4}}>{showEdit?"Save Changes":"Create Project"}</button>
    </>
  );

  const ProjectCard=({p})=>{
    const pct=progressOf(p),next=nextStepOf(p),isOpen=expanded===p.id,remaining=p.steps.filter(s=>!s.done).length;
    return(
      <div style={{background:theme.bg,borderRadius:9,border:`1px solid ${theme.border}`,overflow:"hidden"}}>
        <div onClick={()=>setExpanded(isOpen?null:p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",cursor:"pointer"}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:p.color,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:"0.88rem",fontWeight:700,color:theme.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.title}</span>
              <span style={{fontSize:"0.63rem",padding:"1px 6px",borderRadius:4,background:p.status==="active"?`${theme.accent}22`:p.status==="paused"?"#f9741622":"#22c55e22",color:p.status==="active"?theme.accent:p.status==="paused"?"#f97416":"#22c55e",flexShrink:0,textTransform:"capitalize"}}>{p.status}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <div style={{flex:1,height:4,background:theme.panel,borderRadius:4}}><div style={{height:"100%",background:p.color,borderRadius:4,width:`${pct}%`,transition:"width 0.4s"}}/></div>
              <span style={{fontSize:"0.68rem",color:theme.muted,flexShrink:0}}>{pct}% · {remaining} left</span>
            </div>
          </div>
          <button onClick={e=>{e.stopPropagation();openEdit(p);}} style={{background:"none",border:`1px solid ${theme.border}`,borderRadius:6,color:theme.muted,cursor:"pointer",fontSize:"0.7rem",padding:"3px 7px",flexShrink:0}}>Edit</button>
          <span style={{color:theme.muted,fontSize:"0.8rem",flexShrink:0}}>{isOpen?"▲":"▼"}</span>
        </div>
        {!isOpen&&next&&p.status==="active"&&(
          <div style={{padding:"0 12px 10px",display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1,padding:"7px 10px",background:theme.panel,borderRadius:7,borderLeft:`2px solid ${p.color}`}}>
              <div style={{fontSize:"0.7rem",color:theme.muted,marginBottom:2}}>Next up</div>
              <div style={{fontSize:"0.8rem",color:theme.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{next.title}</div>
              <div style={{display:"flex",gap:8,marginTop:3}}>
                <span style={{fontSize:"0.66rem",color:ENERGY_COLORS[next.energy]}}>{ENERGY_LABELS[next.energy]}</span>
                <span style={{fontSize:"0.66rem",color:theme.muted}}>⏱ {fmtMins(next.mins)}</span>
              </div>
            </div>
            <button onClick={()=>onMarkStepDone(p.id,next.id)} style={{background:p.color,border:"none",borderRadius:7,padding:"8px 10px",color:"#000",fontSize:"0.72rem",fontWeight:700,cursor:"pointer",flexShrink:0,lineHeight:1.3,textAlign:"center"}}>Mark<br/>Done</button>
          </div>
        )}
        {isOpen&&(
          <div style={{padding:"0 12px 12px"}}>
            {p.description&&<div style={{fontSize:"0.78rem",color:theme.muted,marginBottom:10,fontStyle:"italic"}}>{p.description}</div>}
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {p.steps.map((s,idx)=>{
                const isNext=p.type==="linear"&&!s.done&&p.steps.slice(0,idx).every(prev=>prev.done);
                const locked=p.type==="linear"&&!s.done&&idx>0&&!p.steps[idx-1].done;
                return(
                  <div key={s.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 10px",background:theme.panel,borderRadius:7,opacity:locked?0.4:1,borderLeft:`2px solid ${s.done?"#22c55e":isNext?p.color:theme.border}`}}>
                    <button onClick={()=>!locked&&onMarkStepDone(p.id,s.id)} disabled={locked||s.done}
                      style={{width:20,height:20,border:`2px solid ${s.done?"#22c55e":isNext?p.color:theme.muted}`,borderRadius:5,background:s.done?"#22c55e":"transparent",cursor:locked||s.done?"default":"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontSize:"0.75rem",fontWeight:700,padding:0,marginTop:1}}>
                      {s.done?"✓":""}
                    </button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:"0.82rem",color:s.done?theme.muted:theme.text,textDecoration:s.done?"line-through":"none",lineHeight:1.35}}>{s.title}</div>
                      <div style={{display:"flex",gap:8,marginTop:3}}>
                        <span style={{fontSize:"0.66rem",color:s.done?theme.muted:ENERGY_COLORS[s.energy]}}>{ENERGY_LABELS[s.energy]}</span>
                        <span style={{fontSize:"0.66rem",color:theme.muted}}>⏱ {fmtMins(s.mins)}</span>
                        {isNext&&<span style={{fontSize:"0.62rem",background:`${p.color}22`,color:p.color,padding:"1px 5px",borderRadius:4}}>NEXT</span>}
                        {locked&&<span style={{fontSize:"0.62rem",color:theme.muted}}>🔒 Complete previous first</span>}
                      </div>
                    </div>
                    {!s.done&&!locked&&(
                      <button onClick={()=>onAddToTodo({id:genId(),title:`[${p.title}] ${s.title}`,priority:"medium",dueDate:"",dueTime:"",completed:false})}
                        style={{background:"none",border:`1px solid ${theme.border}`,borderRadius:6,color:theme.muted,cursor:"pointer",fontSize:"0.65rem",padding:"3px 6px",flexShrink:0,whiteSpace:"nowrap"}}>+ To-Do</button>
                    )}
                  </div>
                );
              })}
            </div>
            <button onClick={()=>onDeleteProject(p.id)} style={{marginTop:10,background:"none",border:"1px solid #ef444433",borderRadius:6,color:"#ef4444",cursor:"pointer",fontSize:"0.72rem",padding:"4px 10px",opacity:0.7}}>Delete project</button>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:10,padding:14}}>
      <SectionHeader title="Projects" accent={theme.accent} action={
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setShowWhat(true)} style={{background:`${theme.accent}22`,border:`1px solid ${theme.accent}44`,borderRadius:6,color:theme.accent,fontSize:"0.75rem",fontWeight:700,padding:"4px 10px",cursor:"pointer"}}>⚡ What can I do?</button>
          <button onClick={openNew} style={{background:theme.accent,border:"none",borderRadius:6,color:"#000",fontSize:"0.75rem",fontWeight:700,padding:"4px 10px",cursor:"pointer"}}>+ New</button>
        </div>
      }/>
      {projects.length===0&&<p style={{color:theme.muted,fontSize:"0.8rem",textAlign:"center",padding:"10px 0"}}>No projects. Pure potential. Unused potential. Add one.</p>}
      {active.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>{active.map(p=><ProjectCard key={p.id} p={p}/>)}</div>}
      {paused.length>0&&(<div style={{marginBottom:8}}><div style={{fontSize:"0.68rem",color:theme.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Paused</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{paused.map(p=><ProjectCard key={p.id} p={p}/>)}</div></div>)}
      {done.length>0&&(<div><div style={{fontSize:"0.68rem",color:theme.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Completed</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{done.map(p=><ProjectCard key={p.id} p={p}/>)}</div></div>)}
      {(showNew||showEdit)&&(<Modal title={showEdit?"Edit Project":"New Project"} onClose={()=>{setShowNew(false);setShowEdit(null);}} theme={theme}><FormContent/></Modal>)}
      {showWhat&&<WhatCanIDoModal projects={projects} theme={theme} onClose={()=>setShowWhat(false)} onAddToTodo={t=>{onAddToTodo(t);setShowWhat(false);}}/>}
    </div>
  );
}

// ─── SETTINGS PANEL ───────────────────────────────────────────────────────────
function SettingsPanel({settings,theme,onSave,onClose}){
  const [form,setForm]=useState({...settings});
  return(
    <div style={{background:theme.panel,border:`1px solid ${theme.border}`,borderRadius:10,padding:14}}>
      <SectionHeader title="Settings" accent={theme.accent} action={<button onClick={onClose} style={{background:"none",border:"none",color:theme.muted,cursor:"pointer",fontSize:"1rem"}}>✕</button>}/>
      <Inp label="Your Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Tony"/>

      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>Theme</label>
        <div style={{display:"flex",gap:6}}>
          {Object.keys(THEMES).map(t=>(
            <button key={t} onClick={()=>setForm({...form,theme:t})} style={{flex:1,padding:"7px 4px",borderRadius:7,border:`1.5px solid ${form.theme===t?theme.accent:theme.border}`,background:THEMES[t].bg,color:THEMES[t].text,cursor:"pointer",fontSize:"0.72rem",fontWeight:form.theme===t?700:400,textTransform:"capitalize"}}>{t}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <label style={{display:"block",fontSize:"0.73rem",color:"#94a3b8",marginBottom:6}}>Accent Color</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {ACCENT_OPTIONS.map(c=><button key={c} onClick={()=>setForm({...form,accent:c})} style={{width:28,height:28,borderRadius:"50%",background:c,border:`3px solid ${form.accent===c?"#fff":"transparent"}`,cursor:"pointer",padding:0,transition:"border 0.15s"}}/>)}
        </div>
      </div>
      <button onClick={()=>onSave(form)} style={{width:"100%",background:theme.accent,border:"none",borderRadius:8,padding:"10px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:"0.9rem"}}>Save Settings</button>
    </div>
  );
}
